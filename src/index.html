<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>2048</title>
    <link
      rel="stylesheet"
      href="./styles/main.scss"
    />
  </head>
  <body>
    <header class="header">
      <h1>2048</h1>
      <div class="game-stats">
        <span class="stats_title">Score</span>
        <span class="stats_score">0</span>
      </div>
      <button class="button restart">New Game</button>
    </header>
    <main class="main">
      <!-- Statyczna siatka planszy -->
      <div class="grid-container">
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>
        <div class="grid-cell"></div>

        <!-- Dynamiczna warstwa kafelków -->
        <div class="tile-container"></div>
      </div>
      <div class="links">
        <button class="button toggle-theme">
          <img
            src="./images/icons/sun.svg"
            alt="Toggle Theme"
            class="icon-sun"
          />
          <img
            src="./images/icons/moon.svg"
            alt="Toggle Theme"
            class="icon-moon hidden"
          />
        </button>
        <a
          href="https://www.github.com/n3di/js_2048_game"
          target="_blank"
        >
          <img
            src="./images/icons/github.svg"
            alt="Github Icon"
          />
        </a>
      </div>
    </main>
    <footer class="footer">
      <span class="copyright">
        &copy;2024&nbsp;
        <a
          href="https://www.nedi.me"
          target="_blank"
        >
          Michał Szwindowski
        </a>
        . All rights reserved.
      </span>
    </footer>
    <script
      src="scripts/game.js"
      type="module"
    ></script>
    <script
      src="scripts/toggle-theme.js"
      type="module"
    ></script>
  </body>
</html>
